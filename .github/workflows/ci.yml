name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Install in editable mode along with optional deps used by tests.
          # numba is a hard dep, hypothesis is needed for property tests,
          # accelerate / transformers are used by streaming-inference tests.
          pip install -e .
          pip install hypothesis pytest pytest-timeout psutil
          pip install transformers accelerate safetensors torch

      - name: Run the default test suite (no integration tests, no GPU)
        env:
          BIGSMALL_DISABLE_VERSION_CHECK: "1"
          BIGSMALL_FORCE_CPU: "1"
        run: pytest tests/ -q --timeout=180

      # Property tests separately so a Hypothesis-only failure is easy to spot.
      - name: Property-based tests
        env:
          BIGSMALL_DISABLE_VERSION_CHECK: "1"
          BIGSMALL_FORCE_CPU: "1"
        run: pytest tests/test_property_based.py -v --timeout=120
